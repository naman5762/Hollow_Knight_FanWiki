<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hollow Knight — Login</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <nav>
        <div class="nav-left">
            <a href="Home.html"><div class="navbar n1">Home</div></a>
            <a href="Lore.html"><div class="navbar n2">Lore</div></a>
            <a href="Item.html"><div class="navbar n3">Items</div></a>
            <a href="Charms.html"><div class="navbar n4">Charms</div></a>
        </div>
        <div class="nav-right" id="nav-right">
        </div>
    </nav>
</header>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">

        <button class="modal-close" id="modal-close">&#x2715;</button>

        <div class="modal-panel" id="panel-login">
            <div class="modal-icon">&#9670;</div>
            <h2 class="modal-title">Welcome Back</h2>
            <p class="modal-sub">Sign in to your Hallownest account</p>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="Enter your username" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password">
            </div>

            <div class="form-error" id="login-error"></div>

            <button class="btn-primary" id="btn-login">Sign In</button>

            <p class="modal-switch">
                No account? <span class="switch-link" id="go-register">Create one</span>
            </p>
        </div>

        <div class="modal-panel hidden" id="panel-register">
            <div class="modal-icon">&#9670;</div>
            <h2 class="modal-title">Join Hallownest</h2>
            <p class="modal-sub">Create your account</p>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-username" placeholder="Choose a username" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="Your email address">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Create a password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="reg-confirm" placeholder="Repeat your password">
            </div>

            <div class="form-error" id="reg-error"></div>
            <div class="form-success" id="reg-success"></div>

            <button class="btn-primary" id="btn-register">Create Account</button>

            <p class="modal-switch">
                Already have one? <span class="switch-link" id="go-login">Sign in</span>
            </p>
        </div>

    </div>
</div>

<div class="page-content">
    <div class="welcome-wrap">
        <div class="diamond">&#9670;</div>
        <h1 class="welcome-title">Hallownest Archive</h1>
        <p class="welcome-sub">Sign in to track your journey through the fallen kingdom.</p>
        <button class="btn-outline" id="btn-open-login">Enter the Archive</button>
    </div>
</div>

<script src="login.js"></script>
</body>
</html>
